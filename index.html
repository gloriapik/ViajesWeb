<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planeador de viajes</title>
    <meta name="description" content="Planea tu viaje completo: motivo, presupuesto, destino sugerido, riesgos y alojamiento." />
    <!--
      Tailwind vía CDN, no build compilado. [Assumption] Se eligió esta vía para
      no depender de configurar PostCSS en este entorno sin acceso a npm. Es una
      opción válida para desplegar en Vercel, pero para producción a largo plazo
      se recomienda migrar a una instalación compilada de Tailwind (más liviana,
      sin el aviso de "cdn.tailwindcss.com should not be used in production").
    -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
